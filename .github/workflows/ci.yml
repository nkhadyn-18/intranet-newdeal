name: CI Pipeline - Branch Dev

on:
  push:
    branches:
      - dev

jobs:
  build:
    name: Job1 - Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/intranet-newdeal:latest .

  scan:
    name: Job2 - Scan Securite
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image pour scan
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/intranet-newdeal:latest .

      - name: Scan vulnerabilites avec Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/intranet-newdeal:latest
          format: table
          exit-code: '0'

      - name: Scan secrets avec Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  push:
    name: Job3 - Push vers Docker Hub
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build et Push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/intranet-newdeal:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/intranet-newdeal:latest